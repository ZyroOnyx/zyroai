<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyro AI | Onyx v1.5</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #eeeeee; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', system-ui, -apple-system;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; height: 100vh;
        }

        /* --- PROFILE SELECTOR --- */
        #profile-screen {
            position: fixed; inset: 0; background: #fff; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #profile-screen h1 { font-weight: 900; font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 50px; }
        .profile-grid { display: flex; gap: 40px; align-items: flex-start; }
        
        .profile-slot { display: flex; flex-direction: column; align-items: center; gap: 15px; cursor: pointer; position: relative; }
        .profile-circle {
            width: 120px; height: 120px; border: 4px solid #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; background: #fff;
            user-select: none; -webkit-user-select: none;
        }
        .profile-circle:hover { background: #000; color: #fff; transform: translateY(-5px); }
        .profile-circle.add-btn { border-style: dashed; color: #ccc; border-color: #ccc; }
        .profile-circle.add-btn:hover { border-color: #000; color: #000; background: #fff; }
        .profile-name { font-weight: 900; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 11000; display: none; align-items: center; justify-content: center;
        }
        .modal-card { 
            width: 90%; max-width: 400px; padding: 40px; border: 4px solid #000; background: #fff; 
            display: flex; flex-direction: column; gap: 20px;
        }
        .modal-card h3 { margin: 0; font-weight: 900; text-transform: uppercase; }
        .modal-input { width: 100%; padding: 15px; border: 2px solid #000; font-weight: 700; outline: none; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-black { flex: 1; padding: 15px; background: #000; color: #fff; border: none; font-weight: 900; cursor: pointer; }
        .btn-white { flex: 1; padding: 15px; background: #fff; color: #000; border: 2px solid #000; font-weight: 900; cursor: pointer; }

        /* --- LOGO & INTRO --- */
        .logo-corner { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; object-fit: contain; }
        #intro-screen { position: fixed; inset: 0; background: #fff; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .logo-intro { width: 120px; height: 120px; margin-bottom: 20px; opacity: 0; }
        .intro-text { font-size: 5rem; font-weight: 900; letter-spacing: -4px; opacity: 0; }
        .run-intro #intro-screen { display: flex; }
        .run-intro .intro-text, .run-intro .logo-intro { animation: reveal 1.5s forwards; }

        @keyframes reveal { 
            0% { opacity: 0; transform: scale(0.9); filter: blur(10px); } 
            50% { opacity: 1; transform: scale(1); filter: blur(0px); } 
            100% { opacity: 0; transform: scale(1.1); filter: blur(10px); } 
        }

        /* --- MAIN APP --- */
        #app { opacity: 0; display: none; padding: 40px 20px; flex-direction: column; align-items: center; }
        #app.visible { opacity: 1; display: flex; }
        
        .welcome-msg { font-weight: 900; font-size: 1.2rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        .control-panel { width: 100%; max-width: 850px; margin-bottom: 50px; }
        
        .mode-tabs { display: flex; gap: 30px; margin-bottom: 25px; }
        .m-btn { background: none; border: none; font-weight: 900; cursor: pointer; color: #ddd; text-transform: uppercase; border-bottom: 3px solid transparent; }
        .m-btn.active { color: #000; border-bottom: 3px solid #000; }

        /* --- MULTI-SOURCE & CONFIG --- */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .field-group { display: flex; flex-direction: column; gap: 8px; border: 2px solid #eee; padding: 15px; }
        .field-group label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #999; }
        .field-group input, .field-group textarea { border: none; outline: none; font-weight: 800; font-family: inherit; }
        .source-area { grid-column: span 2; }
        .source-area textarea { height: 60px; resize: none; }

        .search-bar { display: flex; width: 100%; border: 4px solid #000; }
        .search-bar input { flex: 1; border: none; padding: 20px; font-size: 1.2rem; font-weight: 700; outline: none; }
        .search-bar button { background: #000; color: #fff; border: none; padding: 0 40px; font-weight: 900; cursor: pointer; }

        /* --- SLIDE CARDS --- */
        #results { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px; }
        .slide-card {
            aspect-ratio: 16 / 9; background: #ffffff; border: 4px solid #000; padding: 60px;
            display: flex; flex-direction: column; justify-content: center; position: relative;
        }
        .slide-card h2 { font-size: 3.5rem; font-weight: 900; margin: 0 0 20px; letter-spacing: -2px; }
        .slide-card p { font-size: 1.5rem; line-height: 1.4; margin: 0; }
        .slide-footer { position: absolute; bottom: 30px; left: 60px; font-weight: 900; font-size: 0.8rem; }
        
        .edit-trigger { position: absolute; top: 30px; right: 30px; background: #000; color: #fff; border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; }

        #export-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #000; padding: 15px 40px; display: none; gap: 20px; z-index: 5000;
        }
        .dock-btn { background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <!-- PROFILE SELECTOR -->
    <div id="profile-screen">
        <img src="icon.png" class="logo-corner">
        <h1>WHO'S JOINING US TODAY?</h1>
        <div class="profile-grid" id="profile-grid"></div>
    </div>

    <!-- MODAL: ADD PROFILE -->
    <div class="modal-overlay" id="modal-add">
        <div class="modal-card">
            <h3>Create Profile</h3>
            <input type="text" id="new-name" class="modal-input" placeholder="PROFILE NAME">
            <input type="password" id="new-key" class="modal-input" placeholder="GEMINI API KEY">
            <div class="modal-btns">
                <button class="btn-black" onclick="saveProfile()">CREATE</button>
                <button class="btn-white" onclick="closeModals()">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- MODAL: DELETE CONFIRM -->
    <div class="modal-overlay" id="modal-del">
        <div class="modal-card">
            <h3>Delete Profile?</h3>
            <p style="font-weight:700;">This action cannot be undone.</p>
            <div class="modal-btns">
                <button class="btn-black" onclick="confirmDelete()">DELETE</button>
                <button class="btn-white" onclick="closeModals()">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- INTRO ANIMATION -->
    <div id="intro-screen">
        <img src="icon.png" class="logo-intro">
        <div class="intro-text">ZYRO AI</div>
    </div>

    <!-- MAIN APP -->
    <div id="app">
        <div class="welcome-msg" id="welcome-text">WELCOME, USER</div>
        
        <div class="control-panel">
            <div class="mode-tabs">
                <button class="m-btn active" id="tab-p" onclick="setMode('points')">Research</button>
                <button class="m-btn" id="tab-s" onclick="setMode('slides')">Slide Deck</button>
            </div>

            <div class="settings-grid">
                <div class="field-group" id="slide-num-group" style="display:none;">
                    <label>Amount of Slides</label>
                    <input type="number" id="sc-num" value="5">
                </div>
                <div class="field-group">
                    <label>Footer Brand</label>
                    <input type="text" id="sc-foot" placeholder="Zyro AI">
                </div>
                <div class="field-group source-area">
                    <label>Multi-Source Vault (Wiki links, YT links, Raw Text)</label>
                    <textarea id="sources" placeholder="Paste links or reference material here..."></textarea>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="main-query" placeholder="Enter topic...">
                <button onclick="generate()">RUN ENGINE</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <div id="export-dock">
        <button class="dock-btn" onclick="exportZip()">ZIP PNG</button>
        <button class="dock-btn" onclick="exportPdf()">PDF</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let PROFILES = JSON.parse(localStorage.getItem('zyro_v15_profiles') || '[]');
        let ACTIVE_PROFILE = null;
        let MODE = 'points';
        let deleteIdx = null;
        let holdTimer;

        // --- PROFILE LOGIC ---
        const renderProfiles = () => {
            const grid = document.getElementById('profile-grid');
            grid.innerHTML = '';
            
            PROFILES.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'profile-slot';
                div.innerHTML = `
                    <div class="profile-circle" 
                         onmousedown="startHold(${i})" 
                         onmouseup="clearHold(${i})" 
                         onmouseleave="clearHold()"
                         ontouchstart="startHold(${i})"
                         ontouchend="clearHold(${i})">
                        ${p.name[0]}
                    </div>
                    <div class="profile-name">${p.name}</div>
                `;
                grid.appendChild(div);
            });

            if (PROFILES.length < 3) {
                const add = document.createElement('div');
                add.className = 'profile-slot';
                add.onclick = () => document.getElementById('modal-add').style.display = 'flex';
                add.innerHTML = `<div class="profile-circle add-btn">+</div><div class="profile-name">NEW</div>`;
                grid.appendChild(add);
            }
        };

        window.startHold = (i) => {
            holdTimer = setTimeout(() => {
                deleteIdx = i;
                document.getElementById('modal-del').style.display = 'flex';
            }, 800);
        };

        window.clearHold = (i) => {
            clearTimeout(holdTimer);
            if (deleteIdx === null && i !== undefined) selectProfile(i);
        };

        window.selectProfile = (i) => {
            ACTIVE_PROFILE = PROFILES[i];
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('welcome-text').innerText = `WELCOME, ${ACTIVE_PROFILE.name}`;
            document.body.classList.add('run-intro');
            setTimeout(() => {
                document.body.classList.remove('run-intro');
                document.getElementById('app').classList.add('visible');
            }, 2000);
        };

        window.saveProfile = () => {
            const name = document.getElementById('new-name').value.trim();
            const key = document.getElementById('new-key').value.trim();
            if (name && key) {
                PROFILES.push({ name, key });
                localStorage.setItem('zyro_v15_profiles', JSON.stringify(PROFILES));
                closeModals();
                renderProfiles();
            }
        };

        window.confirmDelete = () => {
            PROFILES.splice(deleteIdx, 1);
            localStorage.setItem('zyro_v15_profiles', JSON.stringify(PROFILES));
            deleteIdx = null;
            closeModals();
            renderProfiles();
        };

        window.closeModals = () => {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
            deleteIdx = null;
        };

        // --- CORE ENGINE ---
        window.setMode = (m) => {
            MODE = m;
            document.getElementById('tab-p').classList.toggle('active', m === 'points');
            document.getElementById('tab-s').classList.toggle('active', m === 'slides');
            document.getElementById('slide-num-group').style.display = m === 'slides' ? 'flex' : 'none';
            document.getElementById('results').innerHTML = "";
            document.getElementById('export-dock').style.display = 'none';
        };

        window.generate = async () => {
            const q = document.getElementById('main-query').value.trim();
            const src = document.getElementById('sources').value.trim();
            if (!q) return;

            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "<h2 style='text-align:center; font-weight:900;'>ZYRO ANALYZING SOURCES...</h2>";

            try {
                const genAI = new GoogleGenerativeAI(ACTIVE_PROFILE.key);
                const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });
                
                const contextPrompt = src ? `Using these extra sources as factual ground: ${src}. ` : "";
                const mainPrompt = MODE === 'points' 
                    ? `${contextPrompt}Topic: ${q}. Provide 5 research points. JSON: {"data":[{"h":"Title","b":"Body"}]}`
                    : `${contextPrompt}Topic: ${q}. Create ${document.getElementById('sc-num').value} slides. JSON: {"data":[{"h":"Title","b":"Body"}]}`;

                const result = await model.generateContent(mainPrompt);
                const data = JSON.parse(result.response.text().replace(/```json|```/gi, "").trim());

                resDiv.innerHTML = "";
                if (MODE === 'points') {
                    data.data.forEach(item => {
                        resDiv.innerHTML += `<div class="slide-card" style="aspect-ratio:auto; margin-bottom:15px; padding:30px;"><h3>${item.h}</h3><p style="font-size:1.1rem;">${item.b}</p></div>`;
                    });
                } else {
                    renderSlides(data.data);
                }
            } catch (err) {
                resDiv.innerHTML = `<p style="color:red; font-weight:900;">SESSION ERROR: ${err.message}</p>`;
            }
        };

        const renderSlides = (slides) => {
            const resDiv = document.getElementById('results');
            const foot = document.getElementById('sc-foot').value || "Zyro AI";
            slides.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'slide-card'; div.id = `s-node-${i}`;
                div.innerHTML = `<h2 id="sh-${i}">${s.h}</h2><p id="sb-${i}">${s.b.replace(/\n/g, '<br>')}</p><div class="slide-footer">${foot} | ${i+1}</div>`;
                resDiv.appendChild(div);
            });
            document.getElementById('export-dock').style.display = 'flex';
        };

        // --- EXPORT (NO TRANSPARENCY) ---
        const capture = async (el) => {
            return await html2canvas(el, {
                scale: 2, backgroundColor: "#ffffff",
                onclone: (cloned) => {
                    const s = cloned.getElementById(el.id);
                    s.style.color = "#000"; s.style.background = "#fff";
                    s.querySelectorAll('*').forEach(c => { c.style.color = "#000"; c.style.opacity = "1"; });
                }
            });
        };

        window.exportPdf = async () => {
            const pdf = new jspdf.jsPDF('l', 'px', [1280, 720]);
            const cards = document.querySelectorAll('.slide-card');
            for (let i = 0; i < cards.length; i++) {
                const canvas = await capture(cards[i]);
                if (i > 0) pdf.addPage([1280, 720], 'l');
                pdf.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 1280, 720);
            }
            pdf.save("Zyro_Project.pdf");
        };

        window.exportZip = async () => {
            const zip = new JSZip();
            const cards = document.querySelectorAll('.slide-card');
            for (let i = 0; i < cards.length; i++) {
                const canvas = await capture(cards[i]);
                zip.file(`Slide_${i+1}.png`, canvas.toDataURL("image/png").split(',')[1], {base64: true});
            }
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content); link.download = "Zyro_Slides.zip"; link.click();
        };

        renderProfiles();
    </script>
</body>
</html>
